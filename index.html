<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liebe</title>
    <style>
        /* Verhindert Scrollen: Alles passt auf eine Seite */
        html, body { 
            background: #ffe6f0; 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Hintergrund-Wörter (verteilt auf dem Screen) */
        .word { position: absolute; font-weight: bold; opacity: 0.8; text-shadow: 1px 1px 2px #fff; white-space: nowrap; }
        .red { color: #d1003f; }
        .pink { color: #ff2e88; }
        .dark { color: #7a0033; }

        .heart { position: absolute; width: 50px; opacity: 0.4; z-index: 1; }

        /* Der Musik-Button in der Mitte */
        .play-container { z-index: 1000; text-align: center; }
        .play-button {
            background-color: #ff2e88;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(209, 0, 63, 0.4);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* WhatsApp Button unten rechts */
        .whatsapp-button { 
            position: absolute; bottom: 20px; right: 20px; 
            background-color: #25D366; color: white; 
            padding: 10px 15px; border-radius: 50px; 
            text-decoration: none; font-size: 14px; font-weight: bold; 
            z-index: 1000; display: flex; align-items: center; 
        }

        /* Audio Element (unsichtbar) */
        #track { display: none; }
    </style>
</head>
<body>

    <div class="word red" style="top:10%; left:10%; font-size:24px;">LIEBE</div>
    <div class="word pink" style="top:15%; right:10%; font-size:20px;">Nähe</div>
    <div class="word dark" style="top:25%; left:15%; font-size:18px;">Sehnsucht</div>
    <div class="word red" style="top:70%; left:10%; font-size:22px;">Vertrauen</div>
    <div class="word pink" style="top:75%; right:15%; font-size:18px;">Ehrlichkeit</div>
    <div class="word dark" style="bottom:15%; left:30%; font-size:24px;">Traumfrau</div>

    <img class="heart" src="herz.png" style="top:20%; left:50%;">
    <img class="heart" src="herz.png" style="bottom:25%; left:20%;">

    <div class="play-container">
        <button class="play-button" id="btn" onclick="playMusic()">🎵 Drück mich</button>
        <p id="msg" style="color: #d1003f; margin-top: 15px; font-weight: bold; font-size: 18px;">Ich lieb dich!</p>
    </div>

    <audio id="track" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <a href="https://wa.me/4915222351027?text=Liebst du mich? ❤️" class="whatsapp-button" target="_blank">
        💬 Schreib mir
    </a>

    <script>
        function playMusic() {
            var audio = document.getElementById("track");
            var button = document.getElementById("btn");
            var message = document.getElementById("msg");

            audio.play().then(() => {
                button.innerHTML = "❤️ Musik läuft";
                button.style.animation = "none";
                button.style.backgroundColor = "#d1003f";
                message.innerHTML = "Genieß das Lied...";
            }).catch(error => {
                alert("Fehler: Musikdatei konnte nicht geladen werden. Prüfe, ob musik.mp3 im Repository liegt.");
            });
        }
    </script>

</body>
</html>

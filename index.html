<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liebe</title>
    <style>
        body { background: #ffe6f0; font-family: Arial, sans-serif; position: relative; height: 2500px; margin: 0; overflow-x: hidden; }
        
        /* Wörter-Design für Handy optimiert */
        .word { position: absolute; font-weight: bold; opacity: 0.9; text-shadow: 1px 1px 2px #fff; z-index: 10; white-space: nowrap; }
        .red { color: #d1003f; }
        .pink { color: #ff2e88; }
        .dark { color: #7a0033; }

        .heart { position: absolute; width: 60px; opacity: 0.5; z-index: 1; }

        /* Der Musik-Start-Button */
        .play-box {
            position: absolute;
            top: 250px; /* Zwischen den ersten Wörtern */
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            text-align: center;
        }

        .play-button {
            background-color: #ff2e88;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(209, 0, 63, 0.4);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Versteckter Player */
        .audio-container { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; opacity: 0.7; }
        audio { height: 35px; width: 280px; }

        .whatsapp-button { position: fixed; bottom: 80px; right: 20px; background-color: #25D366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 2px 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="play-box" id="startArea">
        <button class="play-button" onclick="startEverything()">🎵 Drück mich</button>
        <p style="color: #d1003f; font-size: 12px; margin-top: 8px;">(für die Musik)</p>
    </div>

    <div class="word red" style="top:50px; left:10%; font-size:35px;">LIEBE</div>
    <div class="word pink" style="top:150px; left:5%; font-size:28px;">Liebe</div>
    <div class="word dark" style="top:400px; left:40%; font-size:24px;">Sehnsucht</div>
    <div class="word red" style="top:600px; left:10%; font-size:30px;">Zweisamkeit</div>
    <div class="word red" style="top:1100px; left:5%; font-size:22px;">Ich lieb dich vom ganzen Herzen</div>
    <div class="word dark" style="top:1500px; left:20%; font-size:45px;">Traumfrau</div>

    <img class="heart" src="herz.png" style="top:100px; left:70%;">
    <img class="heart" src="herz.png" style="top:800px; left:10%;">

    <div class="audio-container">
        <audio id="myAudio" controls loop>
            <source src="musik.mp3" type="audio/mpeg">
        </audio>
    </div>

    <a href="https://wa.me/4915222351027?text=Liebst%20du%20mich%20?%20❤️" class="whatsapp-button" target="_blank">
        💬 Schreib mir
    </a>

    <script>
        function startEverything() {
            var audio = document.getElementById("myAudio");
            // Musik starten
            audio.play();
            // Button verschwinden lassen, wenn Musik läuft
            document.getElementById("startArea").style.display = "none";
        }
    </script>

</body>
</html>
